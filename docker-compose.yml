services:
  translens:
    build: .
    container_name: translens
    restart: unless-stopped
    ports:
      - "127.0.0.1:7070:8080"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.5-flash-preview}
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - PORT=8080
      - DB_PATH=/app/data/translations.db
    volumes:
      - ./data:/app/data
    networks:
      - npm-network

networks:
  npm-network:
    external: true
