<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TransLens — 登录或注册以使用翻译与纠错工具">
    <title>TransLens — 登录</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=2.0.0">
    <style>
        .login-wrapper {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: var(--bg);
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 4px 24px var(--shadow-color, rgba(0, 0, 0, 0.06));
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand-name {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .login-brand-icon {
            font-size: 1.25rem;
            margin-right: 0.35rem;
        }

        .login-brand-sub {
            margin-top: 0.35rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .login-field input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease;
            box-sizing: border-box;
        }

        .login-field input:focus {
            border-color: var(--accent);
        }

        .login-field input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .login-error {
            padding: 0.65rem 0.9rem;
            border-radius: 12px;
            font-size: 0.82rem;
            line-height: 1.5;
            background: var(--error-bg);
            color: var(--error-text);
            display: none;
        }

        .login-error.visible {
            display: block;
        }

        .login-submit {
            width: 100%;
            padding: 0.7rem 1rem;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.15s ease, transform 0.1s ease;
        }

        .login-submit:hover {
            opacity: 0.92;
        }

        .login-submit:active {
            transform: scale(0.98);
        }

        .login-submit:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .login-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .login-switch-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-weight: 500;
            cursor: pointer;
            font-size: inherit;
            font-family: inherit;
            text-decoration: none;
        }

        .login-switch-btn:hover {
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .login-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: login-spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 0.4rem;
        }

        @keyframes login-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-name">
                    <span class="login-brand-icon">🌐</span>TransLens
                </div>
                <div class="login-brand-sub" id="login-subtitle">登录以继续使用</div>
            </div>

            <form class="login-form" id="login-form" novalidate>
                <div class="login-field">
                    <label for="login-email">邮箱</label>
                    <input id="login-email" type="email" autocomplete="email" placeholder="you@example.com" required>
                </div>
                <div class="login-field">
                    <label for="login-password">密码</label>
                    <input id="login-password" type="password" autocomplete="current-password" placeholder="至少 8 个字符" required>
                </div>
                <div class="login-error" id="login-error" role="alert"></div>
                <button type="submit" class="login-submit" id="login-submit">登录</button>
            </form>

            <div class="login-switch" id="login-switch">
                还没有账号？
                <button class="login-switch-btn" id="login-switch-btn">注册</button>
            </div>
        </div>
    </div>

    <script>
        // ── Theme (reuse from main app) ──
        (function initTheme() {
            const saved = localStorage.getItem('translens-theme');
            if (saved) document.documentElement.dataset.theme = saved;
        })();

        // ── Elements ──
        const form = document.getElementById('login-form');
        const emailInput = document.getElementById('login-email');
        const passwordInput = document.getElementById('login-password');
        const submitBtn = document.getElementById('login-submit');
        const errorEl = document.getElementById('login-error');
        const subtitle = document.getElementById('login-subtitle');
        const switchSection = document.getElementById('login-switch');
        const switchBtn = document.getElementById('login-switch-btn');

        let mode = 'login'; // 'login' | 'register'
        let loading = false;

        // ── If already logged in, redirect ──
        if (localStorage.getItem('tl_token')) {
            window.location.replace('/');
        }

        // ── Fetch config to determine registration availability ──
        fetch('/api/config')
            .then(r => r.json())
            .then(cfg => {
                if (!cfg.registration_enabled) {
                    switchSection.style.display = 'none';
                }
            })
            .catch(() => {
                // Config unavailable — hide registration to be safe
                switchSection.style.display = 'none';
            });

        // ── Mode switch ──
        switchBtn.addEventListener('click', () => {
            mode = mode === 'login' ? 'register' : 'login';
            updateUI();
        });

        function updateUI() {
            hideError();
            if (mode === 'login') {
                subtitle.textContent = '登录以继续使用';
                submitBtn.textContent = '登录';
                switchSection.innerHTML = '还没有账号？ <button class="login-switch-btn" id="login-switch-btn">注册</button>';
                passwordInput.autocomplete = 'current-password';
            } else {
                subtitle.textContent = '创建你的账号';
                submitBtn.textContent = '注册';
                switchSection.innerHTML = '已有账号？ <button class="login-switch-btn" id="login-switch-btn">登录</button>';
                passwordInput.autocomplete = 'new-password';
            }
            // Re-bind switch button after innerHTML replacement
            document.getElementById('login-switch-btn').addEventListener('click', () => {
                mode = mode === 'login' ? 'register' : 'login';
                updateUI();
            });
        }

        // ── Error display ──
        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('visible');
        }
        function hideError() {
            errorEl.textContent = '';
            errorEl.classList.remove('visible');
        }

        // ── Submit ──
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (loading) return;
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email) { showError('请输入邮箱地址'); return; }
            if (password.length < 8) { showError('密码至少需要 8 个字符'); return; }

            loading = true;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="login-spinner"></span>' + (mode === 'login' ? '登录中…' : '注册中…');

            try {
                const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || (mode === 'login' ? '登录失败' : '注册失败'));
                }

                // Store token and redirect
                localStorage.setItem('tl_token', data.token);
                window.location.replace('/');
            } catch (err) {
                showError(err.message);
            } finally {
                loading = false;
                submitBtn.disabled = false;
                submitBtn.textContent = mode === 'login' ? '登录' : '注册';
            }
        });

        // Focus email input on load.
        emailInput.focus();
    </script>
</body>

</html>
