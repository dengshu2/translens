<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TransLens - 个人中英翻译学习工具，记录地道美式英文表达">
    <title>TransLens — 翻译学习</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <a href="#input-chinese" class="skip-link">跳至主要内容</a>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <h1 class="header-title">
                <span class="icon">🌐</span>
                TransLens
            </h1>
            <div class="header-actions">
                <button class="btn-header btn-theme" id="btn-theme" title="切换主题" aria-label="切换深色或浅色主题">
                    <span id="theme-icon">🌙</span>
                </button>
                <a href="/api/export/csv" class="btn-header" id="btn-export">
                    <span>↓</span> Export CSV
                </a>
            </div>
        </header>

        <!-- Input -->
        <section class="input-section" aria-label="翻译输入">
            <div class="textarea-wrapper" id="textarea-wrapper">
                <textarea class="input-textarea" id="input-chinese"
                    placeholder="输入中文，获取地道美式英文表达..." rows="3"
                    maxlength="500"></textarea>
                <span class="char-count" id="char-count">0/500</span>
            </div>
            <div class="input-actions">
                <span class="hint-text">Ctrl + Enter 快捷翻译</span>
                <button class="btn-translate" id="btn-translate" disabled>
                    <span class="btn-text">翻译</span>
                </button>
            </div>
        </section>

        <!-- Result (hidden by default) -->
        <section class="result-section" id="result-section" style="display: none;" aria-label="翻译结果">
            <div class="result-card">
                <span class="result-label">Translation</span>
                <div class="result-english" id="result-english"></div>
                <div class="result-chinese" id="result-chinese"></div>
                <button class="result-copy-btn" id="result-copy-btn" title="复制" aria-label="复制翻译结果">📋</button>
            </div>
        </section>

        <!-- History -->
        <section class="history-section" aria-label="翻译历史">
            <div class="history-header">历史记录 <span class="history-count" id="history-count"></span></div>

            <div class="history-search">
                <input type="search" class="search-input" id="search-input" placeholder="搜索翻译记录...">
                <button class="search-clear" id="search-clear" aria-label="清除搜索">✕</button>
            </div>

            <!-- Skeleton loader -->
            <div class="skeleton-list" id="skeleton-list">
                <div class="skeleton-item">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line meta"></div>
                </div>
                <div class="skeleton-item">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line meta"></div>
                </div>
                <div class="skeleton-item">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line meta"></div>
                </div>
            </div>

            <!-- Initial empty state -->
            <div class="state-empty" id="history-empty">
                <span class="state-icon">📝</span>
                <span class="state-title">翻译记录为空</span>
                <span class="state-text">在上方输入中文内容，所有翻译结果会自动保存在这里</span>
            </div>

            <!-- Search no results -->
            <div class="state-empty" id="search-empty" style="display: none;">
                <span class="state-icon">🔍</span>
                <span class="state-title">没有找到匹配的记录</span>
                <span class="state-text">尝试使用不同的关键词搜索</span>
            </div>

            <!-- Error state -->
            <div class="state-error" id="history-error">
                <span class="state-icon">⚠️</span>
                <span class="state-text">加载失败，请检查网络连接</span>
                <button class="btn-retry" id="btn-retry">重试</button>
            </div>

            <ul class="history-list" id="history-list"></ul>

            <div class="load-more-wrapper" id="load-more-wrapper" style="display: none;">
                <button class="btn-load-more" id="btn-load-more">加载更多</button>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <span>TransLens v1.0</span>
            <span class="footer-sep">·</span>
            <span>翻译由 Gemini 驱动</span>
        </footer>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/app.js"></script>
</body>

</html>
